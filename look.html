<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模型预览</title>
  <style>
    body { background-color: #000000; margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 800px; margin: 20px; padding: 30px; box-sizing: border-box; text-align: center; color: #eee; background-color: #111111; border: 1px solid #222; }
    .custom-file-upload { border: 1px solid #00ffcc; color: #00ffcc; background-color: transparent; padding: 12px 24px; font-size: 14px; cursor: pointer; margin: 10px; display: inline-block; transition: all 0.2s ease; outline: none; }
    .custom-file-upload:hover:not(:disabled) { background-color: #00ffcc; color: #000; }
    .custom-file-upload:disabled { border-color: #444; color: #444; cursor: not-allowed; opacity: 0.6; }
    #modelViewerContainer { margin-top: 30px; width: 100%; aspect-ratio: 1 / 1; visibility: hidden; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #080808 100%); border: 1px solid #222; }
    #fileInput { display: none; }
    #uploadPrompt { margin-top: 100px; font-size: 1.2em; color: #666; }
    #loadingBarContainer { width: 60%; margin: 20px auto; height: 6px; background: #222; overflow: hidden; display: none; border: 1px solid #333; }
    #loadingBar { height: 100%; width: 0%; background: #00ffcc; transition: width 0.2s ease; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/@egjs/view3d@latest/css/view3d-bundle.min.css">
</head>
<body>
  <div class="container">
    <label for="fileInput" id="uploadBtn" class="custom-file-upload" style="display:none">上传模型文件</label>
    <button id="captureBtn" class="custom-file-upload" style="display:none" disabled>捕获图像帧</button>
    <button id="downloadModelBtn" class="custom-file-upload" style="display:none" disabled>下载模型</button>
    <button id="fullscreenBtn" class="custom-file-upload" style="display:none" disabled>全屏展示</button>
    <input type="file" id="fileInput" accept=".gltf, .glb">
    <a id="downloadLink" style="display: none;">下载图像</a>
    <div id="uploadPrompt">等待导入模型...</div>
    <div id="loadingBarContainer"><div id="loadingBar"></div></div>
    <div id="modelViewerContainer"></div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script src="https://unpkg.com/@egjs/view3d@latest/dist/view3d.pkgd.min.js"></script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const urlParams = new URLSearchParams(window.location.search);
    const modelPath = urlParams.get('model');
    const engineType = urlParams.get('type') || '1';
    
    const captureBtn = document.getElementById('captureBtn');
    const downloadModelBtn = document.getElementById('downloadModelBtn');
    const downloadLink = document.getElementById('downloadLink');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const modelViewerContainer = document.getElementById('modelViewerContainer');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const loadingBarContainer = document.getElementById("loadingBarContainer");
    const loadingBar = document.getElementById("loadingBar");

    let scene, camera, renderer, controls, currentModel, mixer, view3dInstance;
    let currentModelUrl = null, currentModelName = 'model.glb';
    const clock = new THREE.Clock();

    function initThree() {
      if (scene) return; 
      scene = new THREE.Scene();
      const width = modelViewerContainer.clientWidth;
      const height = modelViewerContainer.clientHeight;
      camera = new THREE.PerspectiveCamera(45, width / height, 0.01, 10000);
      renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      modelViewerContainer.appendChild(renderer.domElement);
      const ambientLight = new THREE.AmbientLight(0xffffff, 2);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(5, 10, 7.5);
      scene.add(dirLight);
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      animate();
    }

    function loadModel(url, filename) {
      currentModelUrl = url;
      currentModelName = filename;
      loadingBarContainer.style.display = "block";
      loadingBar.style.width = "0%";
      if (engineType === '2') { loadWithView3D(url); } else { loadWithThree(url, filename); }
    }

    function loadWithThree(url, filename) {
      initThree();
      new GLTFLoader().load(url, (gltf) => {
        if (currentModel) { scene.remove(currentModel); if (mixer) mixer.stopAllAction(); }
        currentModel = gltf.scene;
        scene.add(currentModel);
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(currentModel);
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
        }
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2)) * 1.5;
        camera.position.set(center.x, center.y + (size.y * 0.1), center.z + cameraZ);
        camera.updateProjectionMatrix();
        controls.target.copy(center);
        controls.update();
        showUI();
      }, (xhr) => {
        if (xhr.lengthComputable) loadingBar.style.width = (xhr.loaded / xhr.total * 100) + "%";
      }, () => { uploadPrompt.textContent = "加载失败"; });
    }

    function loadWithView3D(url) {
      modelViewerContainer.innerHTML = '<canvas class="view3d-canvas"></canvas>';
      view3dInstance = new View3D("#modelViewerContainer", {
        src: url,
        autoplay: true,
        autoRescale: true,
        centerModel: true,
        canvasSelector: ".view3d-canvas"
      });
      view3dInstance.on("progress", (e) => {
        if (e.total > 0) loadingBar.style.width = (e.loaded / e.total * 100) + "%";
      });
      view3dInstance.on("ready", () => {
        if (view3dInstance.autoPlayer) view3dInstance.autoPlayer.disable();
        showUI();
      });
    }

    function showUI() {
      modelViewerContainer.style.visibility = 'visible';
      uploadPrompt.style.display = 'none';
      captureBtn.style.display = downloadModelBtn.style.display = fullscreenBtn.style.display = "inline-block";
      captureBtn.disabled = downloadModelBtn.disabled = fullscreenBtn.disabled = false;
      loadingBar.style.width = "100%";
      setTimeout(() => { loadingBarContainer.style.display = "none"; }, 400);
    }

    if (modelPath) {
      const decoded = decodeURIComponent(modelPath);
      if (decoded.match(/\.(gltf|glb)$/i)) {
        loadModel(decoded, decoded.split('/').pop());
      } else {
        uploadPrompt.style.display = 'block';
        uploadBtn.style.display = 'inline-block';
      }
    } else {
      uploadPrompt.style.display = 'block';
      uploadBtn.style.display = 'inline-block';
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { loadModel(URL.createObjectURL(file), file.name); }
    });

    captureBtn.addEventListener('click', () => {
      let cvs = (engineType === '2' && view3dInstance) ? view3dInstance.renderer.canvas : renderer.domElement;
      downloadLink.href = cvs.toDataURL('image/png');
      downloadLink.download = `capture_${Date.now()}.png`;
      downloadLink.click();
    });

    downloadModelBtn.addEventListener('click', () => {
      if (!currentModelUrl) return;
      const a = document.createElement('a');
      a.href = currentModelUrl; a.download = currentModelName;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) { modelViewerContainer.requestFullscreen().catch(() => {}); } 
      else { document.exitFullscreen(); }
    });

    function animate() {
      requestAnimationFrame(animate);
      if (engineType === '1' && scene) {
        if (mixer) mixer.update(clock.getDelta());
        if (controls) controls.update();
        if (renderer) renderer.render(scene, camera);
      }
    }

    window.addEventListener('resize', () => {
      if (engineType === '1' && renderer) {
        camera.aspect = modelViewerContainer.clientWidth / modelViewerContainer.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(modelViewerContainer.clientWidth, modelViewerContainer.clientHeight);
      }
    });
  </script>
</body>
</html>
